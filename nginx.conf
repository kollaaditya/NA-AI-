# Nginx Reverse Proxy Configuration for NA AI Systems
# Place at: /etc/nginx/sites-available/naaisystems.com

server {
    listen 80;
    server_name naaisystems.com www.naaisystems.com;
    # Redirect HTTP to HTTPS (Cloudflare handles SSL termination)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name naaisystems.com www.naaisystems.com;

    # SSL - Managed by Cloudflare Origin Certificate
    ssl_certificate     /etc/ssl/cloudflare/naaisystems.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/naaisystems.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Client max body size (for image uploads)
    client_max_body_size 10M;

    # API Proxy to Node.js backend
    location /api/ {
        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
        proxy_connect_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # Serve React frontend (if not using S3/CloudFront)
    location / {
        root /var/www/na-ai-systems/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Logs
    access_log /var/log/nginx/naaisystems.access.log;
    error_log  /var/log/nginx/naaisystems.error.log;
}
